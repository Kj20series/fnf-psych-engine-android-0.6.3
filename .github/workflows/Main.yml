name: Build Android APK and Notify Discord

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Setup JDK 8
      uses: actions/setup-java@v3
      with:
        distribution: 'temurin'
        java-version: 8

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y curl unzip openjdk-8-jdk wget

    - name: Install Haxe
      run: |
        sudo add-apt-repository ppa:haxe/releases -y
        sudo apt-get update
        sudo apt-get install -y haxe

    - name: Setup Android SDK and NDK r15c
      run: |
        mkdir -p $HOME/android-sdk
        wget https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip -O cmdline-tools.zip
        unzip cmdline-tools.zip -d $HOME/android-sdk/
        mkdir -p $HOME/android-sdk/cmdline-tools/latest
        mv $HOME/android-sdk/cmdline-tools/cmdline-tools/* $HOME/android-sdk/cmdline-tools/latest/
        export ANDROID_SDK_ROOT=$HOME/android-sdk
        yes | $HOME/android-sdk/cmdline-tools/latest/bin/sdkmanager --sdk_root=$ANDROID_SDK_ROOT "platform-tools" "platforms;android-28" "build-tools;28.0.3"
        wget https://dl.google.com/android/repository/android-ndk-r15c-linux-x86_64.zip -O ndk-r15c.zip
        unzip ndk-r15c.zip -d $HOME/android-sdk/
        echo "$HOME/android-sdk/android-ndk-r15c" > ndk_path.txt

    - name: Set environment variables
      run: |
        echo "ANDROID_NDK_HOME=$HOME/android-sdk/android-ndk-r15c" >> $GITHUB_ENV
        echo "ANDROID_SDK_ROOT=$HOME/android-sdk" >> $GITHUB_ENV
        echo "JAVA_HOME=$(dirname $(dirname $(readlink -f $(which javac))))" >> $GITHUB_ENV
        echo "PATH=$JAVA_HOME/bin:$PATH" >> $GITHUB_ENV

    - name: Install haxelib dependencies
      run: |
        haxelib install lime
        haxelib install openfl
        haxelib git extension-androidtools https://github.com/jigsaw-4277821/extension-androidtools.git
        haxelib git extension-videoview https://github.com/jigsaw-4277821/extension-videoview.git
        haxelib remove linc_luajit
        haxelib git linc_luajit https://github.com/jigsaw-4277821/linc_luajit.git

    - name: Setup lime android
      run: lime setup android

    - name: Build Android APK
      run: lime build android -final

    - name: Upload APK artifact
      uses: actions/upload-artifact@v3
      with:
        name: apk
        path: export/release/android/bin/app/build/outputs/apk/debug/app-debug.apk

    - name: Upload APK to Discord
      if: success()
      env:
        DISCORD_WEBHOOK_URL: ${{ https://discord.com/api/webhooks/1325352792084451339/7gwGFqQVQddjLnXZb3zhEmTrrN8C6SlraSZEzbysSa7DdeMFJd-wcMdjB_Wk5lnz_ig7 }}
      run: |
        curl -F "payload_json={\"content\": \"✅ Build succeeded! Here is the latest APK.\"}" \
             -F "file=@export/release/android/bin/app/build/outputs/apk/debug/app-debug.apk" \
             $DISCORD_WEBHOOK_URL
