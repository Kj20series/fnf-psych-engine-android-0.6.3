name: Build FNF Psych Engine Android APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Java 8
        uses: actions/setup-java@v3
        with:
          java-version: '8'
          distribution: 'temurin'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y curl wget zip unzip openjdk-8-jdk git

      - name: Install Haxe
        run: |
          sudo add-apt-repository ppa:haxe/releases -y
          sudo apt-get update
          sudo apt-get install -y haxe

      - name: Install haxelibs
        run: |
          haxelib install lime
          haxelib install openfl
          haxelib git extension-androidtools https://github.com/jigsaw-4277821/extension-androidtools.git
          haxelib git extension-videoview https://github.com/jigsaw-4277821/extension-videoview.git
          haxelib remove linc_luajit
          haxelib git linc_luajit https://github.com/jigsaw-4277821/linc_luajit.git

      - name: Download and set up Android SDK/NDK
        run: |
          mkdir -p $HOME/android-sdk
          wget https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip -O cmdline-tools.zip
          unzip cmdline-tools.zip -d $HOME/android-sdk/cmdline-tools
          mv $HOME/android-sdk/cmdline-tools/cmdline-tools $HOME/android-sdk/cmdline-tools/latest
          export ANDROID_SDK_ROOT=$HOME/android-sdk
          yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --sdk_root=$ANDROID_SDK_ROOT "platform-tools" "platforms;android-28" "build-tools;28.0.3"
          wget https://dl.google.com/android/repository/android-ndk-r15c-linux-x86_64.zip -O ndk-r15c.zip
          unzip ndk-r15c.zip -d $HOME/android-sdk/

      - name: Set environment variables
        run: |
          echo "ANDROID_SDK_ROOT=$HOME/android-sdk" >> $GITHUB_ENV
          echo "ANDROID_NDK_HOME=$HOME/android-sdk/android-ndk-r15c" >> $GITHUB_ENV
          echo "JAVA_HOME=$(dirname $(dirname $(readlink -f $(which javac))))" >> $GITHUB_ENV
          echo "PATH=$JAVA_HOME/bin:$PATH" >> $GITHUB_ENV

      - name: Setup Lime for Android
        run: lime setup android -y

      - name: Build APK
        run: lime build android -final

      - name: Upload APK to Discord
        if: success()
        run: |
          curl -F "payload_json={\"content\": \"✅ Build complete! Here's the APK.\"}" \
               -F "file=@export/release/android/bin/app/build/outputs/apk/debug/app-debug.apk" \
               https://discord.com/api/webhooks/1325352792084451339/7gwGFqQVQddjLnXZb3zhEmTrrN8C6SlraSZEzbysSa7DdeMFJd-wcMdjB_Wk5lnz_ig7
