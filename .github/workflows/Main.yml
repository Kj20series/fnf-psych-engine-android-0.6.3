name: Android Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v2

    - name: Set up JDK 8
      uses: actions/setup-java@v1
      with:
        java-version: 1.8

    - name: Install Haxe
      run: |
        sudo add-apt-repository ppa:haxe/releases -y
        sudo apt-get update
        sudo apt-get install haxe -y
        haxelib setup ~/haxelib
        haxelib install hxcpp
        haxelib install openfl
        haxelib install lime
        haxelib run openfl setup
        haxelib git extension-androidtools https://github.com/jigsaw-4277821/extension-androidtools.git
        haxelib git extension-videoview https://github.com/jigsaw-4277821/extension-videoview.git
        haxelib remove linc_luajit
        haxelib git linc_luajit https://github.com/jigsaw-4277821/linc_luajit.git

    - name: Set up Android SDK and NDK
      run: |
        wget https://dl.google.com/android/repository/sdk-tools-linux-4333796.zip
        unzip sdk-tools-linux-4333796.zip -d $HOME/android-sdk
        yes | $HOME/android-sdk/tools/bin/sdkmanager --licenses
        $HOME/android-sdk/tools/bin/sdkmanager "platforms;android-29" "build-tools;29.0.3" "ndk;15.2.4203891"

    - name: Set environment variables
      run: |
        echo "export ANDROID_SDK_ROOT=$HOME/android-sdk" >> $GITHUB_ENV
        echo "export ANDROID_NDK_ROOT=$HOME/android-sdk/ndk/15.2.4203891" >> $GITHUB_ENV
        echo "export PATH=$ANDROID_SDK_ROOT/tools:$ANDROID_SDK_ROOT/platform-tools:$PATH" >> $GITHUB_ENV

    - name: Build APK
      run: |
        haxelib run lime setup android
        haxelib run lime build android -final

    - name: Upload APK
      uses: actions/upload-artifact@v2
      with:
        name: FNF-Psych-Engine-APK
        path: export/release/android/bin/app/build/outputs/apk/debug/app-debug.apk
